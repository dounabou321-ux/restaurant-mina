{% extends "base.html" %}

{% block extra_css %}
<style>
    .account-page {
        min-height: calc(100vh - 72px);
        display: flex;
        align-items: center;
        background: linear-gradient(135deg, rgba(156, 66, 33, 0.05) 0%, rgba(93, 138, 168, 0.05) 100%);
        position: relative;
        overflow: hidden;
    }

    .account-page::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C4221' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        opacity: 0.5;
    }

    .account-card {
        background: var(--card-bg);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(156, 66, 33, 0.15);
        overflow: hidden;
        position: relative;
        z-index: 1;
    }

    .account-header {
        background: linear-gradient(135deg, var(--primary) 0%, #7A3419 100%);
        padding: 40px 40px 60px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .account-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23D4AF37' fill-opacity='0.1' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
    }

    .account-header h1 {
        color: var(--accent);
        font-family: 'Cinzel Decorative', cursive;
        font-size: 2rem;
        margin-bottom: 10px;
        position: relative;
    }

    .account-header p {
        color: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
        position: relative;
    }

    .account-icon {
        width: 80px;
        height: 80px;
        background: var(--card-bg);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: -60px auto 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        position: relative;
        z-index: 2;
    }

    .account-icon i {
        font-size: 2.5rem;
        color: var(--primary);
    }

    .account-body {
        padding: 20px 40px 40px;
    }

    /* Zellige corner decorations */
    .zellige-corner {
        position: absolute;
        width: 60px;
        height: 60px;
        opacity: 0.3;
    }

    .zellige-corner.top-right {
        top: 10px;
        right: 10px;
        background: linear-gradient(135deg, var(--accent) 25%, transparent 25%),
                    linear-gradient(225deg, var(--accent) 25%, transparent 25%),
                    linear-gradient(45deg, var(--accent) 25%, transparent 25%),
                    linear-gradient(315deg, var(--accent) 25%, transparent 25%);
        background-size: 10px 10px;
    }

    .zellige-corner.bottom-left {
        bottom: 10px;
        left: 10px;
        background: linear-gradient(135deg, var(--accent) 25%, transparent 25%),
                    linear-gradient(225deg, var(--accent) 25%, transparent 25%),
                    linear-gradient(45deg, var(--accent) 25%, transparent 25%),
                    linear-gradient(315deg, var(--accent) 25%, transparent 25%);
        background-size: 10px 10px;
    }

    .errorlist {
        list-style: none;
        padding: 0;
        margin: 0 0 15px 0;
    }

    .errorlist li {
        color: #dc3545;
        font-size: 0.875rem;
        padding: 8px 12px;
        background: rgba(220, 53, 69, 0.1);
        border-radius: 8px;
        margin-bottom: 5px;
    }
</style>
{% endblock %}

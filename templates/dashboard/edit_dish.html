{% extends 'dashboard/base_dashboard.html' %}

{% block title %}Modifier le Plat - Dashboard{% endblock %}

{% block dashboard_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Modifier le Plat</h2>
    <a href="{% url 'menu_management' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Retour
    </a>
</div>

<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Nom du plat</label>
                        <input type="text" name="name" class="form-control" value="{{ dish.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3" required>{{ dish.description }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Prix (MAD)</label>
                            <input type="number" name="price" class="form-control" step="0.01" min="0" value="{{ dish.price }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Catégorie</label>
                            <select name="category" class="form-select" required>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if dish.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Image</label>
                        {% if dish.image %}
                        <div class="mb-2">
                            <img src="{{ dish.image.url }}" alt="{{ dish.name }}" style="max-width: 200px;">
                        </div>
                        {% endif %}
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_available" class="form-check-input" id="isAvailable" {% if dish.is_available %}checked{% endif %}>
                        <label class="form-check-label" for="isAvailable">Disponible</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-2"></i> Enregistrer
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

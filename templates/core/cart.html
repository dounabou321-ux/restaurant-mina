{% extends 'base.html' %}

{% block title %}Panier - Mama's Mina{% endblock %}

{% block content %}
<div class="py-5">
    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold" style="color: var(--primary);">
                <i class="bi bi-cart3"></i> Votre Panier
            </h1>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div id="cartItems">
                    <!-- Cart items will be loaded via JavaScript -->
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Résumé</h5>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Sous-total</span>
                            <span id="cartSubtotal">0.00 MAD</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>TVA (10%)</span>
                            <span id="cartTax">0.00 MAD</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <strong>Total</strong>
                            <strong id="cartTotal" style="color: var(--primary); font-size: 1.25rem;">0.00 MAD</strong>
                        </div>
                        <a href="{% url 'checkout' %}" class="btn btn-accent w-100 py-3" id="checkoutBtn">
                            <i class="bi bi-credit-card"></i> Passer la commande
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="{% url 'menu' %}" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Retour au menu
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function loadCart() {
    const cart = getCart();
    const container = document.getElementById('cartItems');
    
    if (cart.length === 0) {
        container.innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-cart-x display-1 text-muted"></i>
                <h3 class="mt-3">Votre panier est vide</h3>
                <p class="text-muted">Ajoutez des plats depuis notre menu</p>
                <a href="{% url 'menu' %}" class="btn btn-primary mt-3">Voir le menu</a>
            </div>
        `;
        document.getElementById('checkoutBtn').classList.add('disabled');
        return;
    }
    
    let html = '<div class="card shadow-sm"><div class="card-body p-0"><table class="table mb-0"><thead><tr><th>Plat</th><th>Prix</th><th>Quantité</th><th>Total</th><th></th></tr></thead><tbody>';
    
    cart.forEach(item => {
        html += `
            <tr>
                <td>${item.name}</td>
                <td>${item.price.toFixed(2)} MAD</td>
                <td>
                    <div class="btn-group">
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity(${item.id}, -1)">-</button>
                        <span class="btn btn-sm btn-light">${item.quantity}</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQuantity(${item.id}, 1)">+</button>
                    </div>
                </td>
                <td>${(item.price * item.quantity).toFixed(2)} MAD</td>
                <td>
                    <button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `;
    });
    
    html += '</tbody></table></div></div>';
    container.innerHTML = html;
    
    // Update totals
    const subtotal = getCartTotal();
    const tax = subtotal * 0.1;
    const total = subtotal + tax;
    
    document.getElementById('cartSubtotal').textContent = subtotal.toFixed(2) + ' MAD';
    document.getElementById('cartTax').textContent = tax.toFixed(2) + ' MAD';
    document.getElementById('cartTotal').textContent = total.toFixed(2) + ' MAD';
}

document.addEventListener('DOMContentLoaded', loadCart);
</script>
{% endblock %}
